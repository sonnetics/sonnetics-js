<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Sonnetics Wake Word Demo</title>

        <script type="importmap">
            {
                "imports": {
                    "@sonnetics/js": "https://cdn.jsdelivr.net/npm/@sonnetics/js@0.0.1-beta.10/dist/index.js",
                    "@sonnetics/core": "https://cdn.jsdelivr.net/npm/@sonnetics/core@0.0.1-beta.18/sonnetics_core.js",
                    "fflate": "https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js"
                }
            }
        </script>

        <style>
            * { box-sizing: border-box; margin: 0; }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                display: flex; justify-content: center; align-items: center;
                min-height: 100vh; background: #f5f5f5;
            }
            .card {
                background: white; border-radius: 12px; padding: 2rem 2.5rem;
                box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center;
                max-width: 400px; width: 100%;
            }
            h1 { font-size: 1.25rem; margin-bottom: 0.75rem; }
            #status { font-size: 1rem; margin-bottom: 1.25rem; min-height: 1.5em; color: #333; }
            button {
                font-size: 1rem; padding: 0.6rem 2rem; border: none; border-radius: 8px;
                background: #2563eb; color: white; cursor: pointer;
            }
            button:hover { background: #1d4ed8; }
            button:disabled { opacity: 0.5; cursor: default; }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Sonnetics Wake Word</h1>
            <div id="status">Loading...</div>
            <button id="btn" disabled>Start</button>
        </div>

        <script>
            window.addEventListener("unhandledrejection", ({ reason }) => {
                document.getElementById("status").textContent = "Error: " + reason;
            });
        </script>
        <script type="module" src="./main.js"></script>
    </body>
</html>
